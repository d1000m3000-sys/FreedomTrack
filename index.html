<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freedom Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0f172a;
    color: white;
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
}

input {
    background: #334155;
    color: white;
}

button {
    background: #38bdf8;
    color: black;
    font-weight: bold;
}

.habit {
    background: #020617;
    padding: 12px;
    border-radius: 15px;
    margin-top: 15px;
}

.delete {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>Freedom Tracker</h1>

<div class="card">
    <input id="name" placeholder="اسم العادة">
    <input id="time" type="time">
    <input id="money" type="number" placeholder="المبلغ اليومي">
    <input id="date" type="datetime-local">
    <button onclick="addHabit()">إضافة العادة</button>
</div>

<div id="list"></div>

</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];

function save() {
    localStorage.setItem("habits", JSON.stringify(habits));
}

function addHabit() {
    let habit = {
        name: name.value,
        time: time.value,
        money: parseFloat(money.value || 0),
        start: date.value
    };

    if(!habit.name || !habit.start) {
        alert("املأ الحقول");
        return;
    }

    habits.push(habit);
    save();
    render();
}

function deleteHabit(i) {
    habits.splice(i, 1);
    save();
    render();
}

function render() {
    list.innerHTML = "";

    habits.forEach((h, i) => {
        let days = Math.floor((Date.now() - new Date(h.start)) / 86400000);
        let total = (days * h.money).toFixed(2);

        list.innerHTML += `
        <div class="habit">
            <b>${h.name}</b><br>
            ⏰ ${h.time || "-"}<br>
            📅 ${days} يوم<br>
            💸 ${total} $<br>
            <button class="delete" onclick="deleteHabit(${i})">حذف</button>
        </div>
        `;
    });
}

render();

// تسجيل service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
